# Cold Landscape — application configuration
# Loaded at startup; overrides via environment variables take precedence.

app:
  name: cold-landscape
  version: "0.1.0"
  environment: production
  debug: false
  timezone: America/Sao_Paulo

server:
  host: 0.0.0.0
  port: 3000
  read_timeout:  30s
  write_timeout: 30s
  idle_timeout:  120s
  tls:
    enabled:   true
    cert_file: /etc/certs/server.crt
    key_file:  /etc/certs/server.key

database:
  driver:          postgres
  host:            db
  port:            5432
  name:            appdb
  user:            app
  max_open_conns:  25
  max_idle_conns:  5
  conn_max_lifetime: 5m
  migrations:
    auto_run: true
    directory: ./db/migrations

cache:
  driver: redis
  host:   cache
  port:   6379
  db:     0
  ttl:    3600
  key_prefix: "cl:"

auth:
  jwt:
    algorithm: HS256
    expiry:    24h
    issuer:    cold-landscape-api
  password:
    bcrypt_cost: 12
    min_length:  8

logging:
  level:  info
  format: json
  fields:
    service: api
    env:     production
  outputs:
    - type: stdout
    - type: file
      path: /var/log/app/api.log
      rotate:
        max_size_mb: 100
        max_backups:  5
        compress:     true

observability:
  metrics:
    enabled:  true
    path:     /metrics
    port:     9090
  tracing:
    enabled:   true
    exporter:  otlp
    endpoint:  http://otel-collector:4317
    sample_rate: 0.1

feature_flags:
  new_dashboard:   false
  experimental_ai: false
  beta_export:     true
