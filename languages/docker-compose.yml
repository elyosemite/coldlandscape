name: cold-landscape-app

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

services:

  api:
    <<: *default-restart
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: cold-landscape/api:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD}@db:5432/appdb
      REDIS_URL:    redis://cache:6379
      SECRET_KEY:   ${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout:  5s
      retries:  3
    logging: *default-logging
    networks:
      - backend
      - frontend

  worker:
    <<: *default-restart
    image: cold-landscape/api:latest
    command: ["node", "dist/worker.js"]
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD}@db:5432/appdb
      REDIS_URL:    redis://cache:6379
    depends_on:
      - api
    logging: *default-logging
    networks:
      - backend

  db:
    <<: *default-restart
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB:       appdb
      POSTGRES_USER:     app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 10s
      timeout:  5s
      retries:  5
    logging: *default-logging
    networks:
      - backend

  cache:
    <<: *default-restart
    image: redis:7-alpine
    command: redis-server --save 60 1 --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    logging: *default-logging
    networks:
      - backend

  nginx:
    <<: *default-restart
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    logging: *default-logging
    networks:
      - frontend

volumes:
  pg_data:
  redis_data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
